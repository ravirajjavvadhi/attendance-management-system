services:
  - type: web
    name: eduflow-api
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false # User will set this in Render dashboard
      - key: REDIS_URL
        fromService:
          type: redis
          name: eduflow-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"

  - type: worker
    name: eduflow-worker
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && celery -A app.workers.celery_app worker --loglevel=info"
    envVars:
      - key: DATABASE_URL
        sync: false # User will set this
      - key: REDIS_URL
        fromService:
          type: redis
          name: eduflow-redis
          property: connectionString

  - type: redis
    name: eduflow-redis
    ipAllowList: []
    plan: free
